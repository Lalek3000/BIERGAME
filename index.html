<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MÄDCHENNAME MADEMANN - DIE NACHT DER 1000 BIERE</title>
    <style>
        body { margin: 0; padding: 0; background: #111; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { background: #222; box-shadow: 0 0 20px rgba(0,0,0,0.8); max-width: 100%; max-height: 100%; aspect-ratio: 9/16; }
    </style>
    <!-- Firebase SDKs im Legacy-Modus für maximale Stabilität -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body>

<canvas id="gameCanvas" width="540" height="960"></canvas>

<script>
// --- 1. FIREBASE SETUP & INITIALISIERUNG ---
const firebaseConfig = {
    apiKey: "AIzaSyCtgeDbmieZhR58_IriF_uIm3DQuOGSc-A",
    authDomain: "://firebaseapp.com",
    databaseURL: "https://firebasedatabase.app",
    projectId: "biere-handygame",
    storageBucket: "biere-handygame.firebasestorage.app",
    messagingSenderId: "706208794774",
    appId: "1:706208794774:web:9d7a39ee4701ab01e71ab7"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// --- 2. ENGINE-VARIABLEN & SETUP ---
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameState = "MENU";
let highscores = [];
let keys = {}, beers = [], giTos = [], doeners = [], snacks = [], pfuetzen = [];
let beerSpawnTimer = 0, nextGitoRoundTimer = 1200, gitoRoundTimer = 0, gitoRoundActive = false;
let nextDoenerTimer = 7200, milestoneTimer = 0, milestoneEffectActive = false, colorShiftIdx = 0;

// Spielfigur Justus
const player = {
    x: 230, y: 500, width: 60, height: 90, speed: 5, vx: 0, vy: 0,
    biereGesoffen: 0, verschuettet: 0, durst: 100, blase: 0, maxBlase: 15,
    isDrinking: false, drinkTimer: 0, doenerPowerActive: false, doenerTimer: 0, facing: 'right'
};

// Touchscreen-Steuerung
const joystick = { startX: 120, startY: 840, currentX: 120, currentY: 840, active: false, maxRadius: 50, vx: 0, vy: 0 };
const drinkButton = { x: 380, y: 790, radius: 45 };

// Audio- & Bilddateien
const audio = {
    bgMenu: new Audio("backgroundmenu.mp3"), bgBierloch: new Audio("backgroundbierloch.mp3"), bgGito: new Audio("backgroundgito.mp3"),
    ruelps: new Audio("ruelps.mp3"), klirr: new Audio("klirr.mp3"), urin: new Audio("urin.mp3")
};
audio.bgMenu.loop = true; audio.bgBierloch.loop = true; audio.bgGito.loop = true;

const imgJustus = new Image(); imgJustus.src = 'justus.png';
const imgJustusSauft = new Image(); imgJustusSauft.src = 'justussauft.png';
// --- 3. INPUT SYSTEM (KEYBOARD & MOUSE) ---
window.addEventListener('keydown', e => { 
    keys[e.key] = true; 
    if(e.key === ' ' || e.key === 'Spacebar') tryDrink(); 
});
window.addEventListener('keyup', e => { 
    keys[e.key] = false; 
});

canvas.addEventListener('mousedown', e => { handleMouse(e, true); });
canvas.addEventListener('mouseup', () => { joystick.active = false; });

function handleMouse(e, isDown) {
    let rect = canvas.getBoundingClientRect();
    let mx = (e.clientX - rect.left) * (canvas.width / rect.width);
    let my = (e.clientY - rect.top) * (canvas.height / rect.height);

    if (gameState === "MENU") {
        if (mx > 170 && mx < 370 && my > 360 && my < 420) startGame();
        if (mx > 170 && mx < 370 && my > 450 && my < 510) gameState = "RULES";
        return;
    }
    if (gameState === "RULES" && mx > 170 && mx < 370 && my > 700 && my < 760) {
        gameState = "MENU"; return;
    }
    if (gameState === "GAMEOVER") {
        gameState = "MENU"; return;
    }

    if (gameState === "PLAYING" && isDown) {
        let distToBtn = Math.sqrt((mx - drinkButton.x)**2 + (my - drinkButton.y)**2);
        if (distToBtn < drinkButton.radius) tryDrink();
    }
}

function tryDrink() {
    if (!player.isDrinking && player.durst >= 15) {
        player.isDrinking = true;
        player.drinkTimer = 60;
        if (!player.doenerPowerActive) player.durst -= 15;
    }
}
// --- 4. TOUCH SYSTEM (MOBILE MULTITOUCH) ---
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    handleTouch(e.touches);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    handleTouch(e.touches);
}, { passive: false });

canvas.addEventListener('touchend', e => {
    e.preventDefault();
    joystick.active = false;
    joystick.currentX = joystick.startX;
    joystick.currentY = joystick.startY;
    joystick.vx = 0; joystick.vy = 0;
}, { passive: false });

function handleTouch(touches) {
    let rect = canvas.getBoundingClientRect();
    for (let i = 0; i < touches.length; i++) {
        let tx = (touches[i].clientX - rect.left) * (canvas.width / rect.width);
        let ty = (touches[i].clientY - rect.top) * (canvas.height / rect.height);

        if (gameState === "MENU") {
            if (tx > 170 && tx < 370 && ty > 360 && ty < 420) startGame();
            if (tx > 170 && tx < 370 && ty > 450 && ty < 510) gameState = "RULES";
            return;
        }
        if (gameState === "RULES" && tx > 170 && tx < 370 && ty > 700 && ty < 760) {
            gameState = "MENU"; return;
        }
        if (gameState === "GAMEOVER") {
            gameState = "MENU"; return;
        }

        if (gameState === "PLAYING") {
            let distToBtn = Math.sqrt((tx - drinkButton.x)**2 + (ty - drinkButton.y)**2);
            if (distToBtn < drinkButton.radius) { tryDrink(); continue; }

            let distToJoy = Math.sqrt((tx - joystick.startX)**2 + (ty - joystick.startY)**2);
            if (distToJoy < joystick.maxRadius * 2) {
                joystick.active = true;
                let angle = Math.atan2(ty - joystick.startY, tx - joystick.startX);
                let dist = Math.min(distToJoy, joystick.maxRadius);
                joystick.currentX = joystick.startX + Math.cos(angle) * dist;
                joystick.currentY = joystick.startY + Math.sin(angle) * dist;
                joystick.vx = Math.cos(angle) * (dist / joystick.maxRadius);
                joystick.vy = Math.sin(angle) * (dist / joystick.maxRadius);
            }
        }
    }
}

function startGame() {
    gameState = "PLAYING";
    player.biereGesoffen = 0; player.verschuettet = 0; player.blase = 0; player.durst = 100;
    beers = []; giTos = []; doeners = []; snacks = []; pfuetzen = [];
    audio.bgMenu.pause();
    audio.bgBierloch.currentTime = 0;
    audio.bgBierloch.play().catch(e => console.log(e));
}
// --- 5. GAME PHYSICS & LOGIK-UPDATES ---
function updateGame() {
    if (--beerSpawnTimer <= 0) {
        beers.push({
            x: canvas.width / 2, y: 80,
            vx: (Math.random() - 0.5) * 6, vy: -2 - Math.random() * 2,
            width: 24, height: 32, gravity: 0.15
        });
        beerSpawnTimer = 7 + Math.floor(Math.random() * 13);
    }

    if (!gitoRoundActive && --nextGitoRoundTimer <= 0) {
        gitoRoundActive = true; gitoRoundTimer = 480;
        audio.bgBierloch.pause(); audio.bgGito.currentTime = 0;
        audio.bgGito.play().catch(e => console.log(e));
    }

    if (gitoRoundActive) {
        if (--gitoRoundTimer % 10 === 0) {
            giTos.push({
                x: canvas.width - 60, y: 150 + Math.random() * 300,
                vx: -5 - Math.random() * 3, vy: (Math.random() - 0.5) * 4,
                width: 24, height: 28
            });
        }
        if (gitoRoundTimer <= 0) {
            gitoRoundActive = false; nextGitoRoundTimer = (120 + Math.floor(Math.random() * 120)) * 60;
            audio.bgGito.pause(); audio.bgBierloch.play().catch(e => console.log(e));
        }
    }

    if (--nextDoenerTimer <= 0) {
        doeners.push({
            x: canvas.width / 2, y: 80, vx: (Math.random() - 0.5) * 4, vy: 1,
            width: 30, height: 20, gravity: 0.05
        });
        nextDoenerTimer = (90 + Math.floor(Math.random() * 60)) * 60;
    }

    if (Math.random() < 0.005 && snacks.length < 3) {
        snacks.push({ x: canvas.width - 120 + Math.random() * 80, y: 150 + Math.random() * 350, width: 20, height: 20 });
    }

    if (player.doenerPowerActive && --player.doenerTimer <= 0) player.doenerPowerActive = false;
    if (player.isDrinking && --player.drinkTimer <= 0) player.isDrinking = false;
    if (!player.doenerPowerActive && player.durst < 100) player.durst += 0.03;

    let moveX = keys['d'] || keys['D'] || keys['ArrowRight'] ? 1 : (keys['a'] || keys['A'] || keys['ArrowLeft'] ? -1 : 0);
    let moveY = keys['s'] || keys['S'] || keys['ArrowDown'] ? 1 : (keys['w'] || keys['W'] || keys['ArrowUp'] ? -1 : 0);
    if (joystick.active) { moveX = joystick.vx; moveY = joystick.vy; }

    if (moveX !== 0 && moveY !== 0) {
        let len = Math.sqrt(moveX * moveX + moveY * moveY);
        moveX /= len; moveY /= len;
    }

    let alc = Math.min(player.biereGesoffen / 200, 1.0);
    let speed = player.blase >= player.maxBlase ? player.speed * 0.4 : player.speed;
    let swayX = alc > 0 ? Math.sin(Date.now() * 0.003) * alc * 2.5 : 0;
    let swayY = alc > 0 ? Math.cos(Date.now() * 0.004) * alc * 1.5 : 0;

    player.vx += (moveX * speed + swayX - player.vx) * (0.15 - alc * 0.12);
    player.vy += (moveY * speed + swayY - player.vy) * (0.15 - alc * 0.12);
    player.x = Math.max(0, Math.min(canvas.width - player.width, player.x + player.vx));
    player.y = Math.max(120, Math.min(canvas.height - 180 - player.height, player.y + player.vy));

    if (moveX > 0.1) player.facing = 'right';
    if (moveX < -0.1) player.facing = 'left';

    if (player.x < 120 && player.blase > 0) {
        player.blase -= 0.3; if (player.blase < 0) player.blase = 0;
        if (audio.urin.paused) { audio.urin.currentTime = 0; audio.urin.play().catch(e => console.log(e)); }
    } else { audio.urin.pause(); }
}
// --- 6. KOLLISIONEN & HIGHSCORE SYSTEM ---
function checkCollisions() {
    let pR = { x: player.x, y: player.y, w: player.width, h: player.height };
    let checkHit = (el) => pR.x < el.x + el.width && pR.x + pR.w > el.x && pR.y < el.y + el.height && pR.y + pR.h > el.y;

    for (let i = beers.length - 1; i >= 0; i--) {
        let b = beers[i]; b.vy += b.gravity; b.x += b.vx; b.y += b.vy;
        if (checkHit(b)) {
            if (player.isDrinking && player.blase < player.maxBlase) {
                player.biereGesoffen++; player.blase++;
                audio.ruelps.currentTime = 0; audio.ruelps.play().catch(e => console.log(e));
                if (player.biereGesoffen % 100 === 0) { colorShiftIdx++; milestoneEffectActive = true; milestoneTimer = 120; }
            } else {
                player.verschuettet++; audio.klirr.currentTime = 0; audio.klirr.play().catch(e => console.log(e));
                pfuetzen.push({ x: b.x, y: Math.min(b.y, canvas.height - 190) });
                if (player.verschuettet >= 100) gameOver();
            }
            beers.splice(i, 1); continue;
        }
        if (b.y > canvas.height - 180 || b.x < 0 || b.x > canvas.width) beers.splice(i, 1);
    }

    for (let i = giTos.length - 1; i >= 0; i--) {
        let g = giTos[i]; g.x += g.vx; g.y += g.vy;
        if (checkHit(g)) {
            if (player.isDrinking && player.blase < player.maxBlase) {
                player.biereGesoffen += 3; player.blase++;
                audio.ruelps.currentTime = 0; audio.ruelps.play().catch(e => console.log(e));
                if (player.biereGesoffen % 100 === 0) { colorShiftIdx++; milestoneEffectActive = true; milestoneTimer = 120; }
            } else {
                player.verschuettet++; audio.klirr.currentTime = 0; audio.klirr.play().catch(e => console.log(e));
                pfuetzen.push({ x: g.x, y: g.y }); if (player.verschuettet >= 100) gameOver();
            }
            giTos.splice(i, 1); continue;
        }
        if (g.x < 0 || g.y < 120 || g.y > canvas.height - 180) giTos.splice(i, 1);
    }

    for (let i = doeners.length - 1; i >= 0; i--) {
        let d = doeners[i]; d.vy += d.gravity; d.x += d.vx; d.y += d.vy;
        if (checkHit(d)) {
            if (player.isDrinking) { player.doenerPowerActive = true; player.doenerTimer = 600; player.durst = 100; audio.ruelps.currentTime = 0; audio.ruelps.play().catch(e => console.log(e)); }
            doeners.splice(i, 1); continue;
        }
        if (d.y > canvas.height - 180) doeners.splice(i, 1);
    }

    for (let i = snacks.length - 1; i >= 0; i--) {
        if (checkHit(snacks[i])) { player.durst = Math.min(100, player.durst + 25); snacks.splice(i, 1); }
    }
}

function gameOver() {
    gameState = "GAMEOVER";
    audio.bgBierloch.pause(); audio.bgGito.pause();
    audio.bgMenu.currentTime = 0; audio.bgMenu.play().catch(e => console.log(e));
    if (player.biereGesoffen > 0) {
        let name = prompt("Du bist in der Top-Liste! Bitte trage deinen Namen ein:", "SAUFBOLZEN");
        if (name) {
            db.collection("highscores").add({
                name: name, score: player.biereGesoffen, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => { loadHighscores(); });
        } else { loadHighscores(); }
    } else { loadHighscores(); }
}

function loadHighscores() {
    db.collection("highscores").orderBy("score", "desc").limit(5).get().then(snapshot => {
        highscores = []; snapshot.forEach(doc => { highscores.push(doc.data()); });
    }).catch(err => console.log("Highscore Fehler:", err));
}
// --- 7. VISUALS, UI RENDERING & ENGINE LOOP ---
function drawMenu() {
    ctx.fillStyle = "#111"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#fff"; ctx.font = "bold 26px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("MÄDCHENNAME MADEMANN", canvas.width / 2, 140);
    ctx.font = "20px sans-serif"; ctx.fillText("DIE NACHT DER 1000 BIERE", canvas.width / 2, 180);

    ctx.fillStyle = "#2ecc71"; ctx.fillRect(170, 360, 200, 60);
    ctx.fillStyle = "#3498db"; ctx.fillRect(170, 450, 200, 60);

    ctx.fillStyle = "#fff"; ctx.font = "bold 18px sans-serif";
    ctx.fillText("START", canvas.width / 2, 395);
    ctx.fillText("SPIELREGELN", canvas.width / 2, 485);

    ctx.fillStyle = "#aaa"; ctx.font = "bold 16px sans-serif";
    ctx.fillText("=== TOP 5 HIGHSCORES ===", canvas.width / 2, 570);

    ctx.font = "14px sans-serif";
    if (highscores.length === 0) {
        ctx.fillText("Lade globale Highscores...", canvas.width / 2, 610);
    } else {
        highscores.forEach((hs, idx) => {
            ctx.fillText(`${idx + 1}. ${hs.name} - ${hs.score} BIERE`, canvas.width / 2, 610 + idx * 25);
        });
    }
}

function drawRules() {
    ctx.fillStyle = "#111"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#fff"; ctx.font = "bold 22px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("SPIELREGELN", canvas.width / 2, 100);

    ctx.font = "14px sans-serif"; ctx.textAlign = "left";
    let txt = [
        "• Ziel: Trinke 1000 Biere, um ein Gratis-Ticket zu gewinnen!",
        "• Bewege dich mit WASD / Pfeiltasten oder dem Joystick unten.",
        "• Drücke LEERTASTE oder den TRINKEN-Button zum Saufen.",
        "• Trinken kostet Durst. Ist der Balken leer, tippst du umsonst.",
        "• Trinken erhöht deine Blase. Bei 15 Getränken ist sie randvoll!",
        "• Volle Blase bremst dich aus! Fliehe sofort ins Klo nach links.",
        "• Sammle an der Bar rechts Snacks ein, um Durst aufzuladen.",
        "• Erwische Döner für 10 Sekunden unendlichen Durst.",
        "• Achtung: Unaktiviertes Saufen verschüttet Getränke!",
        "• Bei 100 verschütteten Bieren fliegst du unwiderruflich raus."
    ];
    txt.forEach((t, i) => ctx.fillText(t, 40, 160 + i * 42));

    ctx.fillStyle = "#e74c3c"; ctx.fillRect(170, 700, 200, 60);
    ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.font = "bold 18px sans-serif";
    ctx.fillText("ZURÜCK", canvas.width / 2, 735);
}

function renderGame() {
    let colors = ["#222", "#2a1f3d", "#1f332a", "#3d361f", "#3d1f1f"];
    ctx.fillStyle = colors[colorShiftIdx % colors.length]; ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#333"; ctx.fillRect(0, 120, 130, 660);
    ctx.fillStyle = "#444";
    for (let y = 120; y < 780; y += 20) {
        for (let x = 0; x < 120; x += 20) { if ((x + y) / 20 % 2 === 0) ctx.fillRect(x, y, 20, 20); }
    }
    ctx.fillStyle = "#e67e22"; ctx.fillRect(40, 300, 45, 60);
    ctx.fillStyle = "#fff"; ctx.font = "10px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("Ed Sheeran", 62, 290);

    ctx.fillStyle = "#2c3e50"; ctx.fillRect(410, 120, 130, 660);
    ctx.fillStyle = "#7f8c8d"; ctx.fillRect(410, 120, 8, 660);
    ctx.fillStyle = "#fff"; ctx.font = "12px sans-serif"; ctx.fillText("BAR (GiTo)", 475, 150);

    ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, 120);

    if (milestoneTimer > 0) {
        milestoneTimer--; if (Math.floor(Date.now() / 100) % 2 === 0) { ctx.fillStyle = "rgba(241, 196, 15, 0.4)"; ctx.fillRect(0, 0, canvas.width, canvas.height); }
    }

    let bandY = 50 + Math.sin(Date.now() * 0.008) * 6;
    ctx.fillStyle = "#9b59b6"; ctx.fillRect(130, bandY, 30, 50);
    ctx.fillStyle = "#e74c3c"; ctx.fillRect(255, bandY - 6, 30, 56);
    ctx.fillStyle = "#3498db"; ctx.fillRect(380, bandY, 30, 50);
    ctx.fillStyle = "#fff"; ctx.font = "11px sans-serif";
    ctx.fillText("Keyboard", 145, bandY - 10); ctx.fillText("Drummer", 270, bandY - 15); ctx.fillText("Bassist", 395, bandY - 10);

    ctx.fillStyle = "#f39c12"; pfuetzen.forEach(p => ctx.fillRect(p.x - 15, p.y - 3, 30, 6));
    ctx.fillStyle = "#f1c40f"; beers.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));
    ctx.fillStyle = "#2ecc71"; giTos.forEach(g => ctx.fillRect(g.x, g.y, g.width, g.height));
    ctx.fillStyle = "#d35400"; doeners.forEach(d => ctx.fillRect(d.x, d.y, d.width, d.height));
    ctx.fillStyle = "#e67e22"; snacks.forEach(s => ctx.fillRect(s.x, s.y, s.width, s.height));

    ctx.save();
    let curImg = player.isDrinking ? imgJustusSauft : imgJustus;
    if (curImg.complete && curImg.naturalWidth !== 0) {
        if (player.facing === 'left') { ctx.translate(player.x + player.width, player.y); ctx.scale(-1, 1); ctx.drawImage(curImg, 0, 0, player.width, player.height); }
        else { ctx.drawImage(curImg, player.x, player.y, player.width, player.height); }
    } else {
        ctx.fillStyle = player.isDrinking ? "#2ecc71" : "#34495e"; ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.fillStyle = "#fff"; ctx.font = "bold 11px sans-serif"; ctx.fillText(player.isDrinking ? "SAUFT" : "JUSTUS", player.x + player.width/2, player.y + 40);
    }
    ctx.restore();

    ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, 120, canvas.width, 45);
    ctx.fillStyle = "#fff"; ctx.font = "bold 13px sans-serif"; ctx.textAlign = "left";
    ctx.fillText(`Biere: ${player.biereGesoffen}`, 15, 147); ctx.fillText(`Verschüttet: ${player.verschuettet}/100`, 115, 147);

    ctx.fillStyle = "#555"; ctx.fillRect(290, 137, 80, 12);
    ctx.fillStyle = player.doenerPowerActive ? "#e67e22" : "#3498db"; ctx.fillRect(290, 137, (player.durst / 100) * 80, 12);
    ctx.fillText("D", 275, 148);

    ctx.fillStyle = "#555"; ctx.fillRect(445, 137, 80, 12);
    ctx.fillStyle = (player.blase >= player.maxBlase) ? "#e74c3c" : "#f1c40f"; ctx.fillRect(445, 137, (player.blase / player.maxBlase) * 80, 12);
    ctx.fillText("B", 430, 148);

    if (player.doenerPowerActive) { ctx.fillStyle = "#e67e22"; ctx.font = "bold 16px sans-serif"; ctx.textAlign = "center"; ctx.fillText("DÖNER POWER: UNENDLICH DURST!", canvas.width / 2, 195); }
    if (!gitoRoundActive && nextGitoRoundTimer < 300) { ctx.fillStyle = "#e74c3c"; ctx.font = "bold 22px sans-serif"; ctx.textAlign = "center"; ctx.fillText(`GiTo-RUNDE IN ${Math.ceil(nextGitoRoundTimer / 60)}...`, canvas.width / 2, 240); }

    ctx.fillStyle = "#111"; ctx.fillRect(0, 780, canvas.width, 180);
    ctx.beginPath(); ctx.arc(joystick.startX, joystick.startY, joystick.maxRadius, 0, Math.PI * 2);
    ctx.fillStyle = "#222"; ctx.fill(); ctx.strokeStyle = "#444"; ctx.lineWidth = 3; ctx.stroke();

    ctx.beginPath(); ctx.arc(joystick.currentX, joystick.currentY, 22, 0, Math.PI * 2);
    ctx.fillStyle = "#e74c3c"; ctx.fill();

    ctx.beginPath(); ctx.arc(drinkButton.x, drinkButton.y, drinkButton.radius, 0, Math.PI * 2);
    ctx.fillStyle = player.isDrinking ? "#2ecc71" : "#d35400"; ctx.fill(); ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = "#fff"; ctx.font = "bold 14px sans-serif"; ctx.textAlign = "center"; ctx.fillText("TRINKEN", drinkButton.x, drinkButton.y + 5);
}

function drawGameOver() {
    ctx.fillStyle = "rgba(0,0,0,0.9)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#fff"; ctx.font = "bold 32px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("GAME OVER", canvas.width / 2, 350);
    ctx.font = "18px sans-serif"; ctx.fillText(`Du hast ${player.biereGesoffen} Biere gesoffen!`, canvas.width / 2, 410);

    if (player.biereGesoffen >= 1000) {
        ctx.fillStyle = "#f1c40f"; ctx.font = "bold 20px sans-serif"; ctx.fillText("GRATIS TICKET GEWONNEN!", canvas.width / 2, 480);
        ctx.font = "16px sans-serif"; ctx.fillText("Code für den 24.10.2024 im Lido:", canvas.width / 2, 510);
        ctx.font = "bold 24px monospace"; ctx.fillText("MDPEKDAMVZG", canvas.width / 2, 550);
    } else { ctx.fillStyle = "#e74c3c"; ctx.fillText("Zu viele Biere verschüttet!", canvas.width / 2, 470); }
    ctx.fillStyle = "#fff"; ctx.font = "14px sans-serif"; ctx.fillText("Tippe irgendwo hin fürs Hauptmenü", canvas.width / 2, 680);
}

function gameLoop() {
    if (gameState === "PLAYING") { updateGame(); checkCollisions(); renderGame(); }
    else if (gameState === "MENU") { drawMenu(); }
    else if (gameState === "RULES") { drawRules(); }
    else if (gameState === "GAMEOVER") { drawGameOver(); }
    requestAnimationFrame(gameLoop);
}

loadHighscores();
audio.bgMenu.play().catch(e => console.log("Audio-Autoplay blockiert:", e));
requestAnimationFrame(gameLoop);

</script>
</body>
</html>
